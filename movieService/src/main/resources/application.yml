server:
  port: 0

spring:
  config:
    import: optional:file:../.env.example[.properties],optional:file:../.env[.properties],optional:file:.env[.properties]
  application:
    name: movieService
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/cinesaga}
  mail:
    default-encoding: UTF-8
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: ${MAIL_PROTOCOL:smtp}
    test-connection: ${MAIL_TEST_CONNECTION:false}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  # Apache Kafka Producer Properties
  kafka:
    producer:
      bootstrap-servers: localhost:9092
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring:
          json:
            type:
              mapping: event:com.doffeii.movieService.entity.dto.EmailMessageKafkaDto
    topic:
      name: email_topics
  # Micrometer tracing / Zipkin Properties
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
# Eureka Properties
eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://eureka:password@localhost:8761/eureka
    fetch-registry: true
    register-with-eureka: true

# Circuit Breaker Properties
management:
  tracing:
    sampling:
      probability: 1.0
  health:
    circuitbreakers:
      enabled: true
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always
resilience4j:
  circuitbreaker:
    instances:
      inventory:
        register-health-indicator: true
        event-consumer-buffer-size: 10
        sliding-window-type: COUNT_BASED
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      inventory:
        max-attempts: 3
        wait-duration: 5s

# Email sender used for booking confirmation tickets.
app:
  bootstrap:
    theaters:
      enabled: false
  mail:
    sender: ${APP_MAIL_SENDER:no-reply@cinesaga.local}
  payment:
    card-hash-secret: ${PAYMENT_CARD_HASH_SECRET:cinesaga-local-card-secret}
