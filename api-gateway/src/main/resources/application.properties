# Eureka Server Route
spring.cloud.gateway.server.webflux.routes[20].id=eureka-server
spring.cloud.gateway.server.webflux.routes[20].uri=http://localhost:8761
spring.cloud.gateway.server.webflux.routes[20].predicates[0]=Path=/eureka/web
spring.cloud.gateway.server.webflux.routes[20].filters[0]=SetPath=/

