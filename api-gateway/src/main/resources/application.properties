eureka.client.service-url.defaultZone=http://eureka:password@localhost:8761/eureka
spring.application.name=api-gateway

logging.level.root=INFO
logging.level.org.springframework.cloud.gateway.route.RouteDefinitionLocator=INFO
logging.level.org.springframework.cloud.gateway=TRACE

# Friendly authentication/account routes
spring.cloud.gateway.server.webflux.routes[0].id=auth-login
spring.cloud.gateway.server.webflux.routes[0].uri=lb://USERSERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/login
spring.cloud.gateway.server.webflux.routes[0].filters[0]=SetPath=/api/user/auth/login

spring.cloud.gateway.server.webflux.routes[1].id=auth-signup
spring.cloud.gateway.server.webflux.routes[1].uri=lb://USERSERVICE
