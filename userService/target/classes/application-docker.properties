spring.data.mongodb.uri=${MONGO_URI:mongodb://${MONGO_USER:rootuser}:${MONGO_PASSWORD:rootpass}@${MONGO_HOST:mongodb}:${MONGO_PORT:27017}/${MONGO_DATABASE:user}?authSource=admin}
server.port=8080
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans
management.tracing.sampling.probability=1.0
eureka.client.serviceUrl.defaultZone=http://eureka:password@eureka-server:8761/eureka
jwt.secret.key=${JWT_SECRET_KEY:secret_secret_secret_secret_secret_secret_secret_secret_secret_secret}
app.admin.setup-key=${ADMIN_SETUP_KEY:CHANGE_ME_ADMIN_SETUP_KEY}
app.mail.sender=${APP_MAIL_SENDER:no-reply@cinesaga.local}
app.otp.expiry-minutes=${OTP_EXPIRY_MINUTES:10}
app.otp.expose-in-response=${OTP_EXPOSE_IN_RESPONSE:false}
