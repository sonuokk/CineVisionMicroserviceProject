server:
  port: 0
spring:
  config:
    import: optional:file:../.env.example[.properties],optional:file:../.env[.properties],optional:file:.env[.properties]
  application:
    name: userService
  ## MongoDB Properties
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/cinesaga}
      auto-index-creation: false
  mail:
    default-encoding: UTF-8
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: ${MAIL_PROTOCOL:smtp}
    test-connection: ${MAIL_TEST_CONNECTION:false}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  ## Micrometer tracing / Zipkin Properties
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

management:
  tracing:
    sampling:
      probability: 1.0

## Eureka Properties
eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://eureka:password@localhost:8761/eureka
    fetch-registry: true
    register-with-eureka: true

# JWT properties
jwt:
  secret:
    key: ${JWT_SECRET_KEY:secret_secret_secret_secret_secret_secret_secret_secret_secret_secret}

app:
  mail:
    sender: ${APP_MAIL_SENDER:}
  otp:
    expiry-minutes: ${OTP_EXPIRY_MINUTES:15}
    expose-in-response: ${OTP_EXPOSE_IN_RESPONSE:false}
  admin:
    email: ${DEFAULT_ADMIN_EMAIL:admin@cinesaga.local}
    password: ${DEFAULT_ADMIN_PASSWORD:Admin@12345}
    full-name: ${DEFAULT_ADMIN_FULL_NAME:CineSaga Admin}
