server:
  port: 0

## Eureka Properties
eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://eureka:password@localhost:8761/eureka
    fetch-registry: true
    register-with-eureka: true

## Apache Kafka Consumer Properties
spring:
  config:
    import: optional:file:../.env.example[.properties],optional:file:../.env[.properties],optional:file:.env[.properties]
  kafka:
    consumer:
      bootstrap-servers: localhost:9092
      group-id: email
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring:
          json:
            trusted:
              packages: "*"
            type:
              mapping: event:com.doffeii.emailService.dto.EmailMessageKafkaDto
    topic:
      name: email_topics
  # Micrometer tracing / Zipkin Properties
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  # Mail Properties
  mail:
    default-encoding: UTF-8
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: ${MAIL_PROTOCOL:smtp}
    test-connection: ${MAIL_TEST_CONNECTION:false}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  application:
    name: emailService

management:
  tracing:
    sampling:
      probability: 1.0
